<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>SentinelOps</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=IBM+Plex+Mono:wght@500;600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/components/dashboard.css">
  </head>
  <body>
    <header class="topbar">
      <div class="brand-block">
        <p class="eyebrow">
          <span class="brand-mark" aria-hidden="true"></span>
          SentinelOps
        </p>
        <h1>Cooling Fleet Monitor</h1>
      </div>
      <div class="summary-strip" id="summary-strip"></div>
    </header>

    <section class="control-band">
      <div class="control-group">
        <button id="sim-start" class="primary">Start</button>
        <button id="sim-stop">Stop</button>
        <label>
          Speed
          <select id="sim-speed">
            <option value="0.5">0.5x</option>
            <option value="1" selected>1x</option>
            <option value="3">3x</option>
            <option value="8">8x</option>
            <option value="15">15x</option>
          </select>
        </label>
        <button id="sim-reset" class="ghost">Reset Fleet</button>
      </div>
      <div class="control-group scenario-controls">
        <span class="control-label">Inject scenario</span>
        <button data-scenario="transient_spike">Transient Spike</button>
        <button data-scenario="bearing_degradation">Bearing Degradation</button>
        <button data-scenario="cooling_blockage">Cooling Blockage</button>
        <button data-scenario="sensor_fault">Sensor Fault</button>
        <button data-scenario="missing_telemetry">Missing Telemetry</button>
        <button data-scenario="sudden_failure">Sudden Failure</button>
      </div>
    </section>

    <main class="dashboard-grid">
      <section class="panel attention-panel">
        <div class="panel-heading">
          <h2>Attention Queue</h2>
          <span id="sim-status" class="status-pill">Simulation</span>
        </div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Severity</th>
                <th>Device</th>
                <th>Issue</th>
                <th>Duration</th>
                <th>Confidence</th>
                <th>Action</th>
              </tr>
            </thead>
            <tbody id="attention-body"></tbody>
          </table>
        </div>
      </section>

      <section class="panel detail-panel">
        <div class="panel-heading">
          <h2 id="detail-title">Device Detail</h2>
          <span id="detail-state" class="state-chip">Loading</span>
        </div>
        <div id="detail-body" class="detail-body"></div>
      </section>
    </main>

    <section class="fleet-section">
      <div class="panel-heading">
        <h2>Fleet Overview</h2>
        <span id="updated-at" class="muted"></span>
      </div>
      <div class="device-grid" id="device-grid"></div>
    </section>

    <template id="empty-row-template">
      <tr>
        <td colspan="6" class="empty-state">No active operator alerts</td>
      </tr>
    </template>

    <script type="module" src="/static/pages/dashboard.js"></script>
  </body>
</html>
